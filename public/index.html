<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilive-Coyote 控制面板</title>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><span>Bilive</span>-Coyote</h1>
      <button id="emergency-btn" class="emergency-btn">紧急停止</button>
    </header>

    <div class="card">
      <div class="card-title">状态</div>
      <div class="status-row">
        <span id="bili-dot" class="status-dot offline"></span>
        <span>B站: </span>
        <span id="bili-text">未连接</span>
      </div>
      <div class="status-row">
        <span id="coyote-dot" class="status-dot offline"></span>
        <span>Coyote: </span>
        <span id="coyote-text">等待配对</span>
      </div>
      <div class="strength-bars">
        <div class="strength-bar-wrap">
          <div class="strength-bar-label"><span>A通道</span><span id="bar-a-val">0/200</span></div>
          <div class="strength-bar">
            <div id="bar-a-fill" class="strength-bar-fill a" style="width:0%"></div>
          </div>
          <div class="strength-bar-sub"><span>APP上限: <span id="app-limit-a">--</span></span></div>
        </div>
        <div class="strength-bar-wrap">
          <div class="strength-bar-label"><span>B通道</span><span id="bar-b-val">0/200</span></div>
          <div class="strength-bar">
            <div id="bar-b-fill" class="strength-bar-fill b" style="width:0%"></div>
          </div>
          <div class="strength-bar-sub"><span>APP上限: <span id="app-limit-b">--</span></span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">强度控制</div>
      <div class="channel-control">
        <div class="channel-ctrl-group">
          <div class="channel-ctrl-header">
            <span class="channel-ctrl-label">A通道</span>
            <span class="channel-ctrl-value" id="ctrl-a-val">0</span>
          </div>
          <div class="channel-ctrl-btns">
            <button class="btn btn-secondary btn-ctrl" data-channel="A" data-action="dec5">-5</button>
            <button class="btn btn-secondary btn-ctrl" data-channel="A" data-action="dec">-1</button>
            <button class="btn btn-primary btn-ctrl" data-channel="A" data-action="inc">+1</button>
            <button class="btn btn-primary btn-ctrl" data-channel="A" data-action="inc5">+5</button>
          </div>
        </div>
        <div class="channel-ctrl-group">
          <div class="channel-ctrl-header">
            <span class="channel-ctrl-label">B通道</span>
            <span class="channel-ctrl-value" id="ctrl-b-val">0</span>
          </div>
          <div class="channel-ctrl-btns">
            <button class="btn btn-secondary btn-ctrl" data-channel="B" data-action="dec5">-5</button>
            <button class="btn btn-secondary btn-ctrl" data-channel="B" data-action="dec">-1</button>
            <button class="btn btn-primary btn-ctrl" data-channel="B" data-action="inc">+1</button>
            <button class="btn btn-primary btn-ctrl" data-channel="B" data-action="inc5">+5</button>
          </div>
        </div>
        <div class="btn-row" style="margin-top:8px">
          <button id="zero-btn" class="btn btn-danger">全部归零</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">B站配置</div>
      <div class="form-group">
        <label>AppKey</label>
        <input id="appKey" type="text" placeholder="B站开放平台 AppKey">
      </div>
      <div class="form-group">
        <label>AppSecret</label>
        <input id="appSecret" type="text" placeholder="B站开放平台 AppSecret">
      </div>
      <div class="form-group">
        <label>主播身份码</label>
        <input id="code" type="text" placeholder="主播身份码">
      </div>
      <div class="form-group">
        <label>App ID</label>
        <input id="appId" type="number" placeholder="应用ID">
      </div>
      <div class="btn-row">
        <button id="bilibili-start" class="btn btn-primary">开始监听</button>
        <button id="bilibili-stop" class="btn btn-secondary">停止</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Coyote 配对</div>
      <div id="qr-view" class="qr-container">
        <img id="qr-img" src="" alt="QR Code" style="display:none">
        <div id="qr-status">加载中...</div>
      </div>
      <div id="pair-detail" style="display:none">
        <div class="status-row">
          <span class="status-dot online"></span>
          <span>已配对</span>
        </div>
        <div class="pair-detail-row"><span class="pair-detail-label">WS端口</span><span id="pair-ws-port">9999</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">礼物规则</div>
      <div id="rules-list"></div>
      <div class="add-rule-form">
        <div class="form-group">
          <label>礼物名</label>
          <input id="rule-name" type="text" placeholder="小心心">
        </div>
        <div class="form-group">
          <label>通道</label>
          <select id="rule-channel">
            <option value="A">A通道</option>
            <option value="B">B通道</option>
            <option value="both">双通道</option>
          </select>
        </div>
        <div class="form-group">
          <label>强度</label>
          <input id="rule-strength" type="number" value="5" min="1" max="200">
        </div>
        <div class="form-group">
          <label>持续(秒)</label>
          <input id="rule-duration" type="number" value="10" min="1">
        </div>
        <div></div>
        <button id="add-rule-btn" class="btn btn-primary">添加规则</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">安全设置</div>
      <p class="hint-text">强度上限 = min(本端设置, APP端上限)。APP端上限只能在手机APP中修改。</p>
      <div class="form-group">
        <label>A通道强度上限 <span class="limit-hint" id="hint-limitA"></span></label>
        <input id="limitA" type="number" value="80" min="0" max="200">
      </div>
      <div class="form-group">
        <label>B通道强度上限 <span class="limit-hint" id="hint-limitB"></span></label>
        <input id="limitB" type="number" value="80" min="0" max="200">
      </div>
      <div class="form-group">
        <label><input id="decayEnabled" type="checkbox" checked> 启用衰减</label>
      </div>
      <div class="form-group">
        <label>衰减速率 (每秒)</label>
        <input id="decayRate" type="number" value="2" min="1" max="200">
      </div>
      <div class="btn-row">
        <button id="save-safety" class="btn btn-primary">保存</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">礼物日志</div>
      <div id="gift-log" class="gift-log"></div>
    </div>
  </div>

  <script type="module" src="./js/panel.js"></script>
</body>
</html>
