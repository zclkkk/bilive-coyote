name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - package.json

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          previous_version=""

          if [ "${{ github.event_name }}" = "push" ]; then
            if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
              previous_version="$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")"
            fi

            if [ "$current_version" = "$previous_version" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          tag="v$current_version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run verify
      - run: bun run build:all

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.detect.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
