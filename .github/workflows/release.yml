name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - Cargo.toml

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-slim
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          extract_package_version() {
            awk '
              /^\[package\][[:space:]]*$/ {
                in_package = 1
                next
              }

              /^\[/ {
                in_package = 0
              }

              in_package && /^[[:space:]]*version[[:space:]]*=/ {
                sub(/^[[:space:]]*version[[:space:]]*=[[:space:]]*"/, "")
                sub(/".*$/, "")
                print
                exit
              }
            ' "$1"
          }

          extract_workspace_package_version() {
            awk '
              /^\[workspace\.package\][[:space:]]*$/ {
                in_workspace_package = 1
                next
              }

              /^\[/ {
                in_workspace_package = 0
              }

              in_workspace_package && /^[[:space:]]*version[[:space:]]*=/ {
                sub(/^[[:space:]]*version[[:space:]]*=[[:space:]]*"/, "")
                sub(/".*$/, "")
                print
                exit
              }
            ' "$1"
          }

          package_uses_workspace_version() {
            awk '
              /^\[package\][[:space:]]*$/ {
                in_package = 1
                next
              }

              /^\[/ {
                in_package = 0
              }

              in_package && /^[[:space:]]*version\.workspace[[:space:]]*=[[:space:]]*true[[:space:]]*$/ {
                found = 1
              }

              END {
                exit found ? 0 : 1
              }
            ' "$1"
          }

          read_version() {
            local file="$1"
            local version=""

            version="$(extract_package_version "$file")"

            if [ -n "$version" ]; then
              echo "$version"
              return 0
            fi

            if package_uses_workspace_version "$file"; then
              extract_workspace_package_version "$file"
              return 0
            fi
          }

          current_version="$(read_version Cargo.toml)"

          if [ -z "$current_version" ]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          previous_version=""

          if [ "${{ github.event_name }}" = "push" ]; then
            if git cat-file -e "${{ github.event.before }}:Cargo.toml" 2>/dev/null; then
              previous_cargo_toml="$(mktemp)"
              git show "${{ github.event.before }}:Cargo.toml" > "$previous_cargo_toml"
              previous_version="$(read_version "$previous_cargo_toml")"
              rm -f "$previous_cargo_toml"
            fi

            if [ "$current_version" = "$previous_version" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          tag="v$current_version"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_name: bilive-coyote-linux-x86_64

          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: bilive-coyote-linux-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        shell: bash
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/bilive-coyote" \
            "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0

  build-windows:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows targets
        shell: bash
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc

      - name: Build x86_64
        shell: bash
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Build aarch64
        shell: bash
        run: cargo build --locked --release --target aarch64-pc-windows-msvc

      - name: Rename artifacts
        shell: bash
        run: |
          cp "target/x86_64-pc-windows-msvc/release/bilive-coyote.exe" \
            "bilive-coyote-windows-x86_64.exe"

          cp "target/aarch64-pc-windows-msvc/release/bilive-coyote.exe" \
            "bilive-coyote-windows-aarch64.exe"

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilive-coyote-windows-x86_64
          path: bilive-coyote-windows-x86_64.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilive-coyote-windows-aarch64
          path: bilive-coyote-windows-aarch64.exe
          if-no-files-found: error
          compression-level: 0

  build-macos:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS targets
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build aarch64
        shell: bash
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Build x86_64
        shell: bash
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Rename artifacts
        shell: bash
        run: |
          cp "target/aarch64-apple-darwin/release/bilive-coyote" \
            "bilive-coyote-macos-aarch64"

          cp "target/x86_64-apple-darwin/release/bilive-coyote" \
            "bilive-coyote-macos-x86_64"

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilive-coyote-macos-aarch64
          path: bilive-coyote-macos-aarch64
          if-no-files-found: error
          compression-level: 0

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilive-coyote-macos-x86_64
          path: bilive-coyote-macos-x86_64
          if-no-files-found: error
          compression-level: 0

  release:
    needs:
      - detect
      - build-linux
      - build-windows
      - build-macos
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: List artifacts
        shell: bash
        run: find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.detect.outputs.tag }}
          files: dist/*/*
          fail_on_unmatched_files: true
          generate_release_notes: true
